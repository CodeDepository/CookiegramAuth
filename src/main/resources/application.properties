server.port=8080

# Load local credentials from local.properties at the project root (gitignored).
# Copy local.properties.example -> local.properties and fill in your values.
spring.config.import=optional:file:./local.properties

spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=jdbc:h2:file:/app/data/cookiegram;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# Enable auth only if a username is provided
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

# PayPal Sandbox
# Set in local.properties for local dev, or as environment variables in Docker/CI
paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.sandbox=true

cookiegram.base-url=${COOKIEGRAM_BASE_URL:http://localhost:8080}
cookiegram.mail.from=${COOKIEGRAM_MAIL_FROM:noreply@cookiegram.local}
