<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Account – Cookiegram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<div class="page-wrapper">
    <nav class="nav">
        <a href="/" class="nav-brand"><span class="cookie-dot"></span>cookiegram</a>
        <div class="nav-links">
            <span id="nav-auth"><a href="/login.html" class="nav-pill">sign in</a></span>
            <span id="nav-user" class="hidden" style="display:flex;gap:6px;align-items:center;">
        <span id="nav-username" style="font-family:var(--font-mono);font-size:.8rem;color:var(--text-soft);"></span>
        <a href="/">home</a>
        <button id="nav-logout">sign out</button>
      </span>
        </div>
    </nav>

    <main class="account-outer">

        <!-- not logged in -->
        <div id="state-unauth" class="hidden auth-card" style="text-align:center;max-width:400px;">
            <div style="font-size:2.5rem;margin-bottom:16px;">🔒</div>
            <div class="form-eyebrow" style="display:flex;justify-content:center;">restricted</div>
            <h2 class="form-title" style="text-align:center;margin-bottom:10px;">sign in <em>first.</em></h2>
            <p class="form-subtitle" style="text-align:center;margin-bottom:24px;">you need to be signed in.</p>
            <a href="/login.html" class="btn btn-primary" style="justify-content:center;">sign in →</a>
        </div>

        <!-- logged in -->
        <div id="state-ok" class="hidden auth-card" style="text-align:center;max-width:400px;">

            <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--neon),var(--neon-dim));color:var(--ink);font-family:var(--font-display);font-size:1.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 24px var(--neon-glow);animation:popIn .4s cubic-bezier(.16,1,.3,1) both;"
                 id="acc-avatar"></div>

            <div class="form-eyebrow" style="display:flex;justify-content:center;">session active</div>
            <h1 class="form-title fade-up" style="text-align:center;margin-bottom:8px;">
                you're <em>in.</em>
            </h1>

            <p style="font-family:var(--font-mono);font-size:.8rem;color:var(--text-muted);margin-bottom:24px;" id="acc-email"></p>

            <!-- session info box -->
            <div class="info-box" style="justify-content:center;margin-bottom:24px;flex-direction:column;gap:4px;text-align:center;">
                <span style="color:var(--success);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;">● session cookie active</span>
                <span style="font-size:.7rem;">CG_SESSION · HttpOnly · Lax</span>
            </div>

            <a href="/" class="btn btn-primary" style="margin-bottom:10px;justify-content:center;">go home →</a>
            <button id="logout-btn" class="btn btn-ghost" style="width:100%;justify-content:center;">
                <span class="btn-spinner"></span>
                <span class="btn-label">sign out</span>
            </button>
        </div>

    </main>

    <footer class="footer">© 2025 cookiegram</footer>
</div>

<style>
    @keyframes popIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
</style>

<script src="/app.js"></script>
<script>
    (async () => {
      const user = await hydrateNav();
      if (!user) {
        document.getElementById('state-unauth').classList.remove('hidden');
        return;
      }
      document.getElementById('acc-avatar').textContent = user.username.charAt(0).toUpperCase();
      document.getElementById('acc-email').textContent  = user.email;
      document.getElementById('state-ok').classList.remove('hidden');

      document.getElementById('logout-btn').addEventListener('click', async function() {
        setLoading(this, true);
        await doLogout();
      });
    })();
</script>
</body>
</html>
