<!doctype html>
<html>
<head><meta charset="utf-8"/><title>Forgot Password</title></head>
<body style="font-family:Arial;max-width:700px;margin:30px auto;padding:0 16px">
<h2>Forgot Password</h2>
<p><a href="/">Home</a></p>

<label>Email</label><br/>
<input id="email" style="width:97%;padding:10px;margin:8px 0" placeholder="h@x.com"/><br/>
<button onclick="send()" style="padding:10px 14px">Generate Reset Token</button>

<pre id="out" style="background:#f6f6f6;padding:8px;border-radius:10px;margin-top:16px">(no request yet)</pre>

<script>
    const baseUrl = "http://localhost:8080";
    function setOut(x){ document.getElementById("out").textContent = JSON.stringify(x,null,2); }

    async function send(){
      try{
        const res = await fetch(baseUrl + "/api/auth/forgot-password", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ email: document.getElementById("email").value })
        });
        const data = await res.json();
        setOut(data);

        if (data.resetToken) {
          // Quick link to reset page:
          const link = baseUrl + "/reset.html?token=" + encodeURIComponent(data.resetToken);
          setOut({ ...data, resetLink: link });
        }
      } catch(e){
        setOut({error:String(e)});
      }
    }
</script>
</body>
</html>
