<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create account - Cookiegram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<div class="page-wrapper">

    <nav class="nav">
        <a href="/index.html" class="nav-brand">
            <span class="cookie-dot"></span>cookiegram
        </a>
        <div class="nav-links">
            <a href="/login.html">sign in</a>
        </div>
    </nav>

    <main class="auth-outer">
        <div class="auth-card">
            <div class="form-eyebrow fade-up">join us</div>
            <h1 class="form-title fade-up d1">create <em>account.</em></h1>
            <p class="form-subtitle fade-up d2">one sign-up, infinite cookie orders.</p>

            <div id="alert" class="alert"></div>

            <form id="form" novalidate>

                <div class="field fade-up d2">
                    <label for="username">username</label>
                    <div class="input-wrap">
                        <input id="username" type="text" placeholder="cookielover"
                               autocomplete="username" autocapitalize="none"/>
                    </div>
                    <div class="field-error"></div>
                </div>

                <div class="field fade-up d3">
                    <label for="email">email</label>
                    <div class="input-wrap">
                        <input id="email" type="email" placeholder="you@example.com"
                               autocomplete="email"/>
                    </div>
                    <div class="field-error"></div>
                </div>

                <div class="field fade-up d3">
                    <label for="pw">password</label>
                    <div class="input-wrap">
                        <input id="pw" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
                               autocomplete="new-password"/>
                        <button type="button" class="pw-toggle" aria-label="Show password"></button>
                    </div>
                    <div class="field-error"></div>
                    <div id="strength-wrap" class="strength-wrap hidden">
                        <div class="strength-bar-bg">
                            <div class="strength-bar" id="strength-bar"></div>
                        </div>
                        <span class="strength-label" id="strength-label"></span>
                    </div>
                </div>

                <div class="field fade-up d4">
                    <label for="pw2">confirm password</label>
                    <div class="input-wrap">
                        <input id="pw2" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
                               autocomplete="new-password"/>
                        <button type="button" class="pw-toggle" aria-label="Show password"></button>
                    </div>
                    <div class="field-error"></div>
                </div>

                <button type="submit" class="btn btn-primary fade-up d5" id="submit-btn">
                    <span class="btn-spinner"></span>
                    <span class="btn-label">create account</span>
                </button>

            </form>

            <div class="form-footer fade-up d5">
                already have one? <a href="/login.html">sign in &rarr;</a>
            </div>
        </div>
    </main>

    <footer class="footer">&#169; 2025 cookiegram</footer>
</div>

<script src="/app.js"></script>
<script>
    initStrength('pw', 'strength-bar', 'strength-label', 'strength-wrap');

    var alertEl = document.getElementById('alert');
    var btn     = document.getElementById('submit-btn');

    ['username', 'email', 'pw', 'pw2'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        clearFieldError(this);
      });
    });

    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideAlert(alertEl);

      var username = document.getElementById('username').value.trim();
      var email    = document.getElementById('email').value.trim();
      var pw       = document.getElementById('pw').value;
      var pw2      = document.getElementById('pw2').value;

      var ok = true;
      if (!username || username.length < 3) {
        setFieldError(document.getElementById('username'), 'at least 3 characters');
        ok = false;
      }
      if (!email || !email.includes('@')) {
        setFieldError(document.getElementById('email'), 'valid email required');
        ok = false;
      }
      if (!pw || pw.length < 6) {
        setFieldError(document.getElementById('pw'), 'at least 6 characters');
        ok = false;
      }
      if (pw !== pw2) {
        setFieldError(document.getElementById('pw2'), 'passwords do not match');
        ok = false;
      }
      if (!ok) return;

      setLoading(btn, true);
      try {
        /* 1. Register */
        await apiFetch('/api/auth/register', {
          method: 'POST',
          body:   { username: username, email: email, password: pw }
        });

        /* 2. Auto-login to set the session cookie */
        var res = await apiFetch('/api/auth/login', {
          method: 'POST',
          body:   { usernameOrEmail: username, password: pw }
        });

        toast.success('account created!', 'redirecting...');

        /* Registration always creates CUSTOMER */
        var role = (res && res.user && res.user.role) ? res.user.role : 'CUSTOMER';
        setTimeout(function() { redirectByRole(role); }, 600);

      } catch (err) {
        setLoading(btn, false);
        showAlert(alertEl, 'error', parseError(err.data, err.status));
      }
    });
</script>
</body>
</html>
